      // ==========================================
      // TEXT COMPARISON / ALIGNMENT ALGORITHM (DP)
      // ==========================================
      function sanitizeForCompare(word) {
        if (!word) return "";
        return word
          .toLowerCase()
          .replace(/^['"“‘(]+|['"”’).,;:!?]+$/g, "")
          .trim();
      }

      function alignAndDiff(originalSentence, typedSentence) {
        const originalWords = originalSentence.trim().split(/\s+/).filter(Boolean);
        const typedWords = typedSentence.trim().split(/\s+/).filter(Boolean);
        const n = originalWords.length;
        const m = typedWords.length;

        const dp = Array(n + 1).fill(null).map(() => Array(m + 1).fill(0));

        for (let i = 0; i <= n; i++) dp[i][0] = i * 1.5;
        for (let j = 0; j <= m; j++) dp[0][j] = j * 1.5;

        for (let i = 1; i <= n; i++) {
          const origSan = sanitizeForCompare(originalWords[i - 1]);
          for (let j = 1; j <= m; j++) {
            const typedSan = sanitizeForCompare(typedWords[j - 1]);
            if (origSan === typedSan) {
              dp[i][j] = dp[i - 1][j - 1];
            } else {
              const subCost = dp[i - 1][j - 1] + 2.0;
              const delCost = dp[i - 1][j] + 1.5;
              const insCost = dp[i][j - 1] + 1.5;
              dp[i][j] = Math.min(subCost, delCost, insCost);
            }
          }
        }

        const diffs = [];
        let i = n, j = m;

        while (i > 0 || j > 0) {
          if (i > 0 && j > 0) {
            const origWord = originalWords[i - 1];
            const typedWord = typedWords[j - 1];
            const origSan = sanitizeForCompare(origWord);
            const typedSan = sanitizeForCompare(typedWord);

            if (origSan === typedSan) {
              diffs.unshift({ word: typedWord, type: "correct" });
              i--; j--;
            } else {
              const subCost = dp[i - 1][j - 1];
              const delCost = dp[i - 1][j];
              const insCost = dp[i][j - 1];
              const minCost = Math.min(subCost + 2.0, delCost + 1.5, insCost + 1.5);

              if (minCost === subCost + 2.0) {
                diffs.unshift({ word: typedWord, type: "incorrect", correction: origWord });
                i--; j--;
              } else if (minCost === delCost + 1.5) {
                diffs.unshift({ word: origWord, type: "missing" });
                i--;
              } else {
                diffs.unshift({ word: typedWord, type: "extra" });
                j--;
              }
            }
          } else if (i > 0) {
            diffs.unshift({ word: originalWords[i - 1], type: "missing" });
            i--;
          } else {
            diffs.unshift({ word: typedWords[j - 1], type: "extra" });
            j--;
          }
        }
        return diffs;
      }

      function calculateAccuracy(diffs) {
        if (!diffs || diffs.length === 0) return 0;
        const total = diffs.length;
        const correct = diffs.filter(d => d.type === "correct").length;
        return Math.round((correct / total) * 100);
      }

      // ==========================================
      // TEXT TO SPEECH (WEB SPEECH SYNTHESIS)
      // ==========================================
      let synth = window.speechSynthesis;
      let speechUtterance = null;

      function getVoicesList() {
        if (!synth) return [];
        return synth.getVoices().filter(v => v.lang.startsWith("en"));
      }

      function speakSentence(text, slow = false) {
        if (!synth) return;
        synth.cancel();

        speechUtterance = new SpeechSynthesisUtterance(text);
        
        // Voice selection
        const voices = getVoicesList();
        const selectedVoice = voices.find(v => v.voiceURI === STATE.settings.voiceURI) || voices[0];
        if (selectedVoice) speechUtterance.voice = selectedVoice;

        // Speed settings
        let rate = STATE.settings.speechRate || 1.0;
        if (slow) rate *= 0.7; // 0.7x slow rate playback
        speechUtterance.rate = Math.max(0.4, Math.min(2.0, rate));

        synth.speak(speechUtterance);
      }

      // ==========================================
      // STREAK TRACKER
      // ==========================================
      function updateActiveStreak() {
        const todayStr = new Date().toDateString();
        const lastActive = STATE.stats.lastActiveDate;

        if (lastActive === todayStr) {
          return; // Already logged today
        }

        if (!lastActive) {
          STATE.stats.streak = 1;
        } else {
          const yesterday = new Date();
          yesterday.setDate(yesterday.getDate() - 1);
          const yesterdayStr = yesterday.toDateString();

          if (lastActive === yesterdayStr) {
            STATE.stats.streak += 1;
          } else {
            STATE.stats.streak = 1; // Streak broken, reset
          }
        }
        STATE.stats.lastActiveDate = todayStr;
        saveState();
      }

      async function callGemini(endpoint, payload) {
        // Mode 1: Custom Client API Key
        if (STATE.settings.customApiKey) {
          const apiKey = STATE.settings.customApiKey;
          let prompt = "";
          let mimeType = undefined;

          if (endpoint === "split") {
            prompt = `Split the following English paragraph or text into a JSON list of individual sentences. Return ONLY a JSON object with a single key "sentences" which is an array of strings. Do not include markdown block syntax.
Text to split:
"${payload.text}"`;
            mimeType = "application/json";
          } else if (endpoint === "translate") {
            prompt = `Translate the following English sentence into clear, natural Vietnamese suitable for English learners (elementary to high school level). Output ONLY the translation, absolutely no extra comments, explanations or markdown.
Sentence: "${payload.sentence}"`;
          } else if (endpoint === "explain") {
            prompt = `You are an encouraging and patient English teacher in Vietnam.
Analyze the user's spelling/grammar mistakes in this dictation exercise.
Original English sentence: "${payload.original}"
User typed sentence: "${payload.typed}"

Provide a short, easy-to-understand explanation in Vietnamese (1 to 3 short sentences/bullet points) targeted at elementary or middle school students.
Explain clearly what they wrote wrong and why it should be corrected. Keep it friendly, clear, and highly encouraging! Do not use markdown headers.`;
          }

          try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const reqBody = {
              contents: [{ parts: [{ text: prompt }] }]
            };
            if (mimeType) {
              reqBody.generationConfig = { responseMimeType: mimeType };
            }

            const response = await fetch(url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(reqBody)
            });

            if (!response.ok) {
              const errData = await response.json();
              throw new Error(errData.error?.message || "Direct API call failed.");
            }

            const resJson = await response.json();
            const rawText = resJson.candidates?.[0]?.content?.parts?.[0]?.text || "";
            
            if (endpoint === "split") {
              const clean = rawText.replace(/```json/g, "").replace(/```/g, "").trim();
              return JSON.parse(clean);
            }
            return { text: rawText.trim() };
          } catch (err) {
            console.error("Direct Gemini call failed:", err);
            throw err;
          }
        }

        // Mode 2: Call workspace proxy (Backend Server)
        try {
          const route = endpoint === "split" ? "/api/split-lesson" :
                        endpoint === "translate" ? "/api/translate-sentence" : "/api/explain-mistake";
          
          const response = await fetch(route, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error("Server proxy request failed");
          }

          const resData = await response.json();
          if (endpoint === "split") {
            return { sentences: resData.sentences };
          } else if (endpoint === "translate") {
            return { text: resData.translation };
          } else {
            return { text: resData.explanation };
          }
        } catch (serverErr) {
          console.error("Server proxy failed:", serverErr);
          throw serverErr;
        }
      }

      // Offline Regex Fallbacks
      function regexSplitSentences(text) {
        return text
          .replace(/([.!?])\s*(?=[A-Z“"'])/g, "$1|")
          .split("|")
          .map(s => s.trim())
          .filter(Boolean);
      }

      function localOfflineTranslation(sentence) {
        // Fallback placeholder
        return "(Bản dịch sẽ tự động tải khi kết nối với máy chủ hoặc thiết lập API Key)";
      }

      // ==========================================
      // ROUTING / SCREEN SWITCHING
      // ==========================================
      function navigate(screen, params = null) {
        STATE.screen = screen;
        STATE.errorMsg = "";
        STATE.isLoading = false;

        if (screen === "practice" && params) {
          STATE.currentLesson = params.lesson;
          STATE.currentSentenceIndex = 0;
          STATE.typedText = "";
          STATE.listenCount = 0;
          
          STATE.currentSentenceSubmitted = false;
          STATE.currentSentenceIsCorrect = false;
          STATE.currentWordDiffs = [];
          STATE.currentAiExplanation = "";
          STATE.currentShowAnswer = false;
          STATE.currentAttemptsUsed = 1;

          STATE.practiceStats = {
            sentencesResults: [],
            startTime: Date.now()
          };
          
          // Play first sentence automatically
          setTimeout(() => {
            speakSentence(STATE.currentLesson.sentences[0]);
            STATE.listenCount = 1;
            render();
          }, 400);
        }

        saveState();
        render();
      }

      function handleWelcomeSubmit(e) {

      function handleSaveCustomLesson(e) {
        e.preventDefault();
        const titleInput = document.getElementById("creator-title");
        const descInput = document.getElementById("creator-desc");
        const textInput = document.getElementById("creator-text");

        const title = titleInput ? titleInput.value.trim() : "";
        const desc = descInput ? descInput.value.trim() : "";
        const text = textInput ? textInput.value.trim() : "";

        if (!title || !text) {
          STATE.errorMsg = "Vui lòng nhập đầy đủ tiêu đề và văn bản bài đọc.";
          render();
          return;
        }

        STATE.isLoading = true;
        render();

        // Split text into sentences using AI or regex fallback
        callGemini("split", { text })
          .then(data => {
            const list = data.sentences || regexSplitSentences(text);
            if (!list || list.length === 0) throw new Error("Không thể trích xuất câu văn.");
            
            if (STATE.editingLessonId) {
              const idx = STATE.customLessons.findIndex(l => l.id === STATE.editingLessonId);
              if (idx !== -1) {
                STATE.customLessons[idx].title = title;
                STATE.customLessons[idx].description = desc || "Bài học tùy chỉnh tự biên soạn.";
                STATE.customLessons[idx].sentences = list;
              }
              STATE.editingLessonId = null;
            } else {
              const newLesson = {
                id: "custom-" + Date.now(),
                level: "custom",
                title,
                description: desc || "Bài học tùy chỉnh tự biên soạn.",
                sentences: list
              };
              STATE.customLessons.unshift(newLesson);
            }
            saveState();
            navigate("dashboard");
          })
          .catch(err => {
            console.warn("Dùng tách câu regex ngoại tuyến:", err);
            const list = regexSplitSentences(text);
            if (STATE.editingLessonId) {
              const idx = STATE.customLessons.findIndex(l => l.id === STATE.editingLessonId);
              if (idx !== -1) {
                STATE.customLessons[idx].title = title;
                STATE.customLessons[idx].description = desc || "Bài học tùy chỉnh tự biên soạn.";
                STATE.customLessons[idx].sentences = list;
              }
              STATE.editingLessonId = null;
            } else {
              const newLesson = {
                id: "custom-" + Date.now(),
                level: "custom",
                title,
                description: desc || "Bài học tùy chỉnh tự biên soạn.",
                sentences: list
              };
              STATE.customLessons.unshift(newLesson);
            }
            saveState();
            navigate("dashboard");
          });
      }

      function handleEditCustomLesson(id) {
        const lesson = STATE.customLessons.find(l => l.id === id);
        if (!lesson) return;
        STATE.editingLessonId = id;
        navigate("creator");
      }

      function handleDeleteCustomLesson(id) {
        if (confirm("Bạn có chắc chắn muốn xóa bài luyện tập tự soạn này không?")) {
          STATE.customLessons = STATE.customLessons.filter(l => l.id !== id);
          saveState();
          render();
        }
      }

      function handleSpeak(slow = false) {
        if (!STATE.currentLesson) return;
        const sentence = STATE.currentLesson.sentences[STATE.currentSentenceIndex];
        speakSentence(sentence, slow);
        STATE.listenCount++;
        render();
      }

      function handleShowTranslation() {
        const sentence = STATE.currentLesson.sentences[STATE.currentSentenceIndex];
        if (STATE.translationCache[sentence]) {
          render();
          return;
        }

        STATE.isLoading = true;
        render();

        callGemini("translate", { sentence })
          .then(res => {
            STATE.translationCache[sentence] = res.text;
            saveState();
            STATE.isLoading = false;
            render();
          })
          .catch(err => {
            STATE.translationCache[sentence] = localOfflineTranslation(sentence);
            STATE.isLoading = false;
            render();
          });
      }

      function handleSaveWordToVocabulary(word, context) {
        const clean = sanitizeForCompare(word);
        if (!clean) return;

        const exists = STATE.vocabulary.some(v => sanitizeForCompare(v.word) === clean);
        if (!exists) {
          STATE.vocabulary.unshift({
            word: word.replace(/[.,;:!?]+/g, ""),
            context,
            timestamp: Date.now()
          });
          saveState();
          // Flash toast or notice
          const alertBox = document.getElementById("practice-toast");
          if (alertBox) {
            alertBox.innerText = `Đã lưu từ "${word}" vào sổ tay!`;
            alertBox.classList.remove("hidden");
            setTimeout(() => alertBox.classList.add("hidden"), 2000);
          }
        }
      }

      function handleDeleteVocabulary(word) {
        STATE.vocabulary = STATE.vocabulary.filter(v => v.word !== word);
        saveState();
        render();
      }

      function handleExplainMistake(original, typed, resIndex) {
        STATE.isLoading = true;
        render();

        callGemini("explain", { original, typed })
          .then(res => {
            STATE.practiceStats.sentencesResults[resIndex].explanation = res.text;
            STATE.isLoading = false;
            render();
          })
          .catch(err => {
            STATE.practiceStats.sentencesResults[resIndex].explanation = "Không có giải thích trực tuyến. Vui lòng kiểm tra lại cấu hình API Key.";
            STATE.isLoading = false;
            render();
          });
      }

      function handleCheckSentence(e) {
        if (e) e.preventDefault();

        // If already checked, ignore form submission (handled by next/retry buttons)
        if (STATE.currentSentenceSubmitted) return;

        const input = document.getElementById("typed-input");
        const typed = input ? input.value.trim() : "";
        if (!typed) {
          alert("Vui lòng nhập câu trả lời của bạn!");
          return;
        }

        STATE.typedText = typed;
        
        const original = STATE.currentLesson.sentences[STATE.currentSentenceIndex];
        const diffs = alignAndDiff(original, typed);
        const accuracy = calculateAccuracy(diffs);
        const isPerfect = accuracy === 100;

        STATE.currentSentenceSubmitted = true;
        STATE.currentSentenceIsCorrect = isPerfect;
        STATE.currentWordDiffs = diffs;
        STATE.currentAiExplanation = "";
        STATE.currentShowAnswer = false;

        // Auto trigger AI explanation if imperfect and customApiKey is available
        if (!isPerfect && STATE.settings.customApiKey) {
          handleExplainCurrentSentenceMistake();
        }

        // Save misspelling to vocabulary automatically if accuracy < 100
        diffs.forEach(d => {
          if (d.type === "incorrect" || d.type === "missing") {
            handleSaveWordToVocabulary(d.word, original);
          }
        });

        // Award stats to user profile immediately if correct on first check
        if (isPerfect) {
          let xpReward = 30;
          let coinReward = 10;

          if (STATE.currentLesson.level === "easy") {
            xpReward = 20; coinReward = 5;
          } else if (STATE.currentLesson.level === "medium") {
            xpReward = 35; coinReward = 10;
          } else if (STATE.currentLesson.level === "hard") {
            xpReward = 50; coinReward = 15;
          }

          STATE.stats.xp += xpReward;
          STATE.stats.coins += coinReward;

          // Level up check
          const nextLevelThreshold = STATE.stats.level * 150;
          if (STATE.stats.xp >= nextLevelThreshold) {
            STATE.stats.level += 1;
          }
        }

        saveState();
        render();
      }

      function handleExplainCurrentSentenceMistake() {
        const original = STATE.currentLesson.sentences[STATE.currentSentenceIndex];
        const typed = STATE.typedText;

        STATE.isLoading = true;
        render();

        callGemini("explain", { original, typed })
          .then(res => {
            STATE.currentAiExplanation = res.text;
            STATE.isLoading = false;
            render();
          })
          .catch(err => {
            STATE.currentAiExplanation = "Không có giải thích trực tuyến. Vui lòng kiểm tra lại cấu hình API Key.";
            STATE.isLoading = false;
            render();
          });
      }

      function handleRetrySentence() {
        STATE.currentSentenceSubmitted = false;
        STATE.currentSentenceIsCorrect = false;
        STATE.currentWordDiffs = [];
        STATE.currentAiExplanation = "";
        STATE.currentShowAnswer = false;
        STATE.currentAttemptsUsed++;

        // Replay the audio
        const sentence = STATE.currentLesson.sentences[STATE.currentSentenceIndex];
        speakSentence(sentence);
        STATE.listenCount++;

        saveState();
        render();
      }

      function handleShowSentenceAnswer() {
        STATE.currentShowAnswer = true;
        render();
      }

      function handleNextSentence() {
        const original = STATE.currentLesson.sentences[STATE.currentSentenceIndex];
        const typed = STATE.typedText || "";
        const diffs = alignAndDiff(original, typed);
        const accuracy = calculateAccuracy(diffs);
        const wasPerfect = STATE.currentSentenceIsCorrect;

        // Award partial rewards if imperfect
        let xpReward = 0;
        let coinReward = 0;

        if (wasPerfect) {
          xpReward = STATE.currentLesson.level === "easy" ? 20 : STATE.currentLesson.level === "medium" ? 35 : 50;
          coinReward = STATE.currentLesson.level === "easy" ? 5 : STATE.currentLesson.level === "medium" ? 10 : 15;
        } else {
          // Partial reward for effort
          xpReward = Math.round(accuracy * 0.15);
          coinReward = Math.round(accuracy * 0.05);

          STATE.stats.xp += xpReward;
          STATE.stats.coins += coinReward;

          // Level up check
          const nextLevelThreshold = STATE.stats.level * 150;
          if (STATE.stats.xp >= nextLevelThreshold) {
            STATE.stats.level += 1;
          }
        }

        // Add to active results
        STATE.practiceStats.sentencesResults.push({
          sentence: original,
          typed: typed,
          diffs: diffs,
          accuracy: accuracy,
          xpEarned: xpReward,
          coinsEarned: coinReward,
          wasPerfect: wasPerfect,
          explanation: STATE.currentAiExplanation || "",
          attemptsUsed: STATE.currentAttemptsUsed
        });

        // Reset current sentence states
        STATE.currentSentenceSubmitted = false;
        STATE.currentSentenceIsCorrect = false;
        STATE.currentWordDiffs = [];
        STATE.currentAiExplanation = "";
        STATE.currentShowAnswer = false;
        STATE.currentAttemptsUsed = 1;

        // Next sentence or complete lesson
        if (STATE.currentSentenceIndex + 1 < STATE.currentLesson.sentences.length) {
          STATE.currentSentenceIndex++;
          STATE.typedText = "";
          STATE.listenCount = 0;

          saveState();

          // Autoplay next sentence
          setTimeout(() => {
            speakSentence(STATE.currentLesson.sentences[STATE.currentSentenceIndex]);
            STATE.listenCount = 1;
            render();
          }, 500);
        } else {
          // Completed lesson, compute total accuracy
          const allRes = STATE.practiceStats.sentencesResults;
          const avgAcc = Math.round(allRes.reduce((acc, curr) => acc + curr.accuracy, 0) / allRes.length);
          const totalXp = allRes.reduce((acc, curr) => acc + curr.xpEarned, 0);
          const totalCoins = allRes.reduce((acc, curr) => acc + curr.coinsEarned, 0);

          STATE.history.unshift({
            date: new Date().toLocaleDateString("vi-VN"),
            lessonTitle: STATE.currentLesson.title,
            accuracy: avgAcc,
            xp: totalXp,
            coins: totalCoins
          });

          saveState();
          navigate("result");
        }
      }

      function handleSaveSettings(e) {
        e.preventDefault();
        const voiceSelect = document.getElementById("settings-voice");
        const rateSelect = document.getElementById("settings-rate");
        const fontSelect = document.getElementById("settings-font");
        const translateCheck = document.getElementById("settings-translate");
        const themeSelect = document.getElementById("settings-theme");
        const apiInput = document.getElementById("settings-api");

        if (voiceSelect) STATE.settings.voiceURI = voiceSelect.value;
        if (rateSelect) STATE.settings.speechRate = parseFloat(rateSelect.value);
        if (fontSelect) STATE.settings.fontSize = fontSelect.value;
        if (translateCheck) STATE.settings.alwaysShowTranslation = translateCheck.checked;
        if (themeSelect) STATE.settings.theme = themeSelect.value;
        if (apiInput) STATE.settings.customApiKey = apiInput.value.trim();

        saveState();
        applyTheme();
        navigate("dashboard");
      }

      function renderLessonCard(l) {
        const difficultyColors = {
          easy: "bg-green-100 text-green-700 dark:bg-green-950 dark:text-green-300",
          medium: "bg-yellow-100 text-yellow-700 dark:bg-yellow-950 dark:text-yellow-300",
          hard: "bg-red-100 text-red-700 dark:bg-red-950 dark:text-red-300",
          custom: "bg-purple-100 text-purple-700 dark:bg-purple-950 dark:text-purple-300"
        };
        const difficultyText = {
          easy: "SƠ CẤP",
          medium: "TRUNG CẤP",
          hard: "NÂNG CAO",
          custom: "TỰ SOẠN"
        };

        const listLength = l.sentences.length;
        const isCustom = l.level === "custom";

        return `
          <div class="bg-white dark:bg-slate-800 p-6 rounded-xl b-heavy border-slate-900 shadow-heavy flex flex-col justify-between hover:-translate-y-1 transition-all duration-200">
            <div>
              <div class="flex items-center justify-between gap-2 mb-3">
                <span class="text-[10px] font-black px-2 py-0.5 rounded-full ${difficultyColors[l.level]}">${difficultyText[l.level]}</span>
                <span class="text-xs text-slate-400 font-mono font-bold">${listLength} câu</span>
              </div>
              <h5 class="text-lg font-black text-slate-900 dark:text-white leading-tight mb-2">${l.title}</h5>
              <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed mb-6">${l.description}</p>
            </div>

            <div class="space-y-2">
              <button 
                onclick="navigate('practice', { lesson: ${JSON.stringify(l).replace(/"/g, '&quot;')} })" 
                class="w-full bg-blue-500 hover:bg-blue-600 text-white font-black py-2.5 px-4 rounded-lg b-heavy border-slate-900 shadow-sm active-pop text-xs tracking-wider transition-colors uppercase flex items-center justify-center gap-1"
              >
                Luyện Chính Tả
                ${getIcon("chevronRight")}
              </button>

              ${isCustom ? `
                <div class="grid grid-cols-2 gap-2">
                  <button 
                    onclick="handleEditCustomLesson('${l.id}')" 
                    class="bg-amber-400 hover:bg-amber-500 text-slate-900 font-black py-2 px-3 rounded-lg b-heavy border-slate-900 text-[10px] tracking-wider transition-colors uppercase active-pop flex items-center justify-center gap-1"
                  >
                    Sửa Bài ✏️
                  </button>
                  <button 
                    onclick="handleDeleteCustomLesson('${l.id}')" 
                    class="bg-rose-100 hover:bg-rose-200 text-rose-700 dark:bg-rose-950 dark:text-rose-300 font-black py-2 px-3 rounded-lg b-heavy border-slate-900 text-[10px] tracking-wider transition-colors uppercase active-pop flex items-center justify-center gap-1"
                  >
                    Xóa Bài 🗑️
                  </button>
                </div>
              ` : ""}
            </div>
          </div>
        `;
      }

      // ==========================================
      // VIEW: PRACTICE SCREEN
      // ==========================================
      function renderPractice() {
        const sentence = STATE.currentLesson.sentences[STATE.currentSentenceIndex];
        const translation = STATE.translationCache[sentence] || "";
        const isLastSentence = STATE.currentSentenceIndex === STATE.currentLesson.sentences.length - 1;

        // Generate Word Diffs Markup if submitted
        let diffMarkup = "";
        if (STATE.currentSentenceSubmitted && STATE.currentWordDiffs.length > 0) {
          diffMarkup = STATE.currentWordDiffs.map(d => {
            if (d.type === "correct") {
              return `<span class="bg-green-100 text-green-850 dark:bg-green-950/60 dark:text-green-300 px-2 py-1 rounded-md font-black border border-green-300 dark:border-green-800">${d.word}</span>`;
            } else if (d.type === "incorrect") {
              return `<span class="bg-red-100 text-red-700 dark:bg-red-950/60 dark:text-red-300 px-2 py-1 rounded-md font-black border border-red-300 dark:border-red-800 line-through mr-1" title="Bạn viết: ${d.word}">${d.word}</span><span class="bg-amber-100 text-amber-800 dark:bg-amber-950/60 dark:text-amber-300 px-2 py-1 rounded-md font-black border border-amber-300 dark:border-amber-800" title="Đáp án: ${d.correction}">${d.correction}</span>`;
            } else if (d.type === "missing") {
              return `<span class="bg-yellow-100 text-yellow-850 dark:bg-yellow-950/60 dark:text-yellow-300 px-2 py-1 rounded-md font-black border border-yellow-300 dark:border-yellow-800 border-dashed" title="Thiếu từ: ${d.word}">${d.word}</span>`;
            } else {
              return `<span class="bg-indigo-100 text-indigo-700 dark:bg-indigo-950/60 dark:text-indigo-300 px-2 py-1 rounded-md font-black border border-indigo-300 dark:border-indigo-800 line-through" title="Thừa từ: ${d.word}">${d.word}</span>`;
            }
          }).join(" ");
        }

        // Generate AI explanation markup
        let explanationHtml = "";
        if (STATE.currentSentenceSubmitted && !STATE.currentSentenceIsCorrect) {
          if (STATE.currentAiExplanation) {
            explanationHtml = `
              <div class="p-4 bg-purple-50 dark:bg-purple-950/20 border-2 border-purple-900 dark:border-purple-600 rounded-xl text-left mt-4">
                <span class="text-xs text-purple-600 dark:text-purple-400 font-black uppercase flex items-center gap-1 mb-1.5">
                  ${getIcon("sparkles")} Giải thích lỗi sai từ AI:
                </span>
                <p class="text-sm text-slate-700 dark:text-slate-300 font-bold whitespace-pre-line leading-relaxed">${STATE.currentAiExplanation}</p>
              </div>
            `;
          } else if (STATE.settings.customApiKey) {
            explanationHtml = `
              <div class="text-left mt-4">
                <button 
                  type="button"
                  onclick="handleExplainCurrentSentenceMistake()" 
                  class="bg-purple-100 hover:bg-purple-200 dark:bg-purple-950/50 dark:text-purple-300 font-black py-2.5 px-4 rounded-xl b-heavy border-slate-900 text-xs active-pop flex items-center gap-1.5"
                >
                  ${getIcon("sparkles")} Giải Thích Lỗi Sai Bằng AI
                </button>
              </div>
            `;
          }
        }

        return `
          <div class="max-w-3xl mx-auto py-4">
            <!-- Lesson title header -->
            <div class="flex items-center justify-between mb-6">
              <div class="flex gap-2">
                <button onclick="navigate('dashboard')" class="flex items-center gap-1.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 p-2.5 rounded-xl b-heavy border-slate-900 text-xs font-bold active-pop">
                  ${getIcon("arrowLeft")}
                  Trở về
                </button>
                ${STATE.currentLesson.level === "custom" ? `
                  <button onclick="handleEditCustomLesson('${STATE.currentLesson.id}')" class="flex items-center gap-1.5 bg-amber-400 hover:bg-amber-500 text-slate-900 p-2.5 rounded-xl b-heavy border-slate-900 text-xs font-black active-pop">
                    ${getIcon("pencil")} Sửa Bài ✏️
                  </button>
                ` : ""}
              </div>

              <div class="text-center font-bold font-mono text-sm bg-blue-50 dark:bg-blue-950/40 text-blue-600 dark:text-blue-400 px-4 py-1.5 rounded-xl b-heavy border-slate-900 dark:border-slate-200">

                  <button onclick="handleSpeak(false)" class="bg-blue-100 text-blue-700 dark:bg-blue-950 dark:text-blue-300 font-black py-2 px-4 rounded-lg b-heavy border-slate-900 text-xs tracking-wider active-pop flex items-center gap-1">
                    ${getIcon("play")} Nghe thường (1.0x)
                  </button>
                  <button onclick="handleSpeak(true)" class="bg-amber-100 text-amber-700 dark:bg-amber-950 dark:text-amber-300 font-black py-2 px-4 rounded-lg b-heavy border-slate-900 text-xs tracking-wider active-pop flex items-center gap-1">
                    ${getIcon("play")} Nghe chậm (0.7x)
                  </button>
                </div>

              <!-- Text Area input form -->

                    class="w-full bg-slate-50 dark:bg-slate-900 b-heavy p-4 rounded-xl text-lg font-bold focus:ring-4 focus:ring-blue-200 outline-none focus:bg-white text-center font-mono ${STATE.settings.fontSize === "small" ? "text-base" : STATE.settings.fontSize === "large" ? "text-2xl" : "text-xl"}"
                    rows="3"

                    >
                      ${getIcon("eye")} Dịch nghĩa câu

                    <button 
                      type="submit" 
                      class="w-1/2 bg-blue-500 hover:bg-blue-600 text-white font-black py-3 px-6 rounded-xl b-heavy border-slate-900 shadow-pop-blue active-pop text-sm uppercase tracking-wider flex items-center justify-center gap-1"
                    >
                      Kiểm tra đáp án 🔍
                    </button>
                  </div>
                ` : ""}
              </form>

              <!-- Evaluation Feedback Section (Visible only when submitted) -->
              ${STATE.currentSentenceSubmitted ? `
                <div class="mt-6 border-t-3 border-slate-900 dark:border-slate-700 pt-6 text-left space-y-6">
                  <!-- Result Alert Header -->
                  <div class="flex items-center gap-3 p-4 rounded-xl b-heavy ${STATE.currentSentenceIsCorrect ? "bg-green-50 dark:bg-green-950/30 border-green-900 dark:border-green-800 text-green-700 dark:text-green-300" : "bg-rose-50 dark:bg-rose-950/30 border-rose-900 dark:border-rose-800 text-rose-700 dark:text-rose-300"}">
                    ${STATE.currentSentenceIsCorrect ? `
                      <span class="text-xl">${getIcon("checkCircle")}</span>

                      >

      // ==========================================
      // VIEW: ACHIEVEMENTS / BADGES
      // ==========================================
      function renderAchievements() {
        const totalSessions = STATE.history.length;
        const totalXp = STATE.stats.xp;
        const streakDays = STATE.stats.streak;

        let badgesListHtml = DEFAULT_BADGES.map(badge => {
          let progress = 0;
          let currentVal = 0;
          if (badge.targetType === "sessions") {
            currentVal = totalSessions;
            progress = (totalSessions / badge.target) * 100;
          } else if (badge.targetType === "xp") {
            currentVal = totalXp;
            progress = (totalXp / badge.target) * 100;
          } else if (badge.targetType === "streak") {
            currentVal = streakDays;
            progress = (streakDays / badge.target) * 100;
          }

          const isUnlocked = progress >= 100;
          progress = Math.min(100, progress);

          return `
            <div class="p-6 bg-slate-50 dark:bg-slate-900 rounded-xl b-heavy border-slate-900 flex items-start gap-4 hover:bg-slate-100/50 transition-colors">
              <div class="w-14 h-14 rounded-xl b-heavy border-slate-900 flex items-center justify-center shrink-0 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] ${isUnlocked ? "bg-amber-400 text-amber-950" : "bg-slate-200 text-slate-400 dark:bg-slate-800 dark:text-slate-600"}">
                ${getIcon(badge.icon)}
              </div>

              <div class="flex-grow">
                <div class="flex items-center justify-between mb-1">
                  <h4 class="font-black text-slate-900 dark:text-white">${badge.name}</h4>
                  <span class="text-[10px] font-black tracking-wider px-2 py-0.5 rounded-full ${isUnlocked ? "bg-green-100 text-green-700" : "bg-slate-200 text-slate-500"}">
                    ${isUnlocked ? "ĐÃ MỞ KHÓA" : "ĐANG KHÓA"}
                  </span>
                </div>
                <p class="text-xs text-slate-500 mb-4">${badge.desc}</p>
                
                <!-- Live progress bar -->
                <div class="flex items-center justify-between text-[10px] font-mono font-bold mb-1 text-slate-400">
                  <span>TIẾN ĐỘ:</span>
                  <span>${currentVal} / ${badge.target}</span>
                </div>
                <div class="w-full bg-slate-200 dark:bg-slate-800 h-2 rounded-full overflow-hidden b-heavy border-slate-900">
                  <div class="bg-amber-400 h-full rounded-full" style="width: ${progress}%"></div>
                </div>
              </div>
            </div>
          `;
        }).join("");

        return `
          <div class="max-w-3xl mx-auto py-4">
            <div class="flex items-center justify-between mb-6">
              <button onclick="navigate('dashboard')" class="flex items-center gap-1.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 p-2.5 rounded-xl b-heavy border-slate-900 text-xs font-bold active-pop">

            </div>

            <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl b-heavy border-slate-900 shadow-heavy">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                ${badgesListHtml}
              </div>
            </div>
          </div>
        `;
      }

                    placeholder="Ví dụ: Cùng tìm hiểu và viết chính tả về các trải nghiệm du lịch thú vị..." 
                    value="${desc.replace(/"/g, '&quot;')}"
                    class="w-full bg-slate-50 dark:bg-slate-900 b-heavy p-3 rounded-lg font-bold outline-none focus:bg-white"
                  />
                </div>

                <div>
                  <label class="block text-sm font-black mb-1.5 uppercase text-slate-700 dark:text-slate-300">Nội dung văn bản tiếng Anh chính tả:</label>
                  <textarea 
                    id="creator-text" 
                    required 
                    placeholder="Hãy dán hoặc gõ toàn bộ bài viết, đoạn văn tiếng Anh của bạn vào đây..." 
                    rows="6"
                    class="w-full bg-slate-50 dark:bg-slate-900 b-heavy p-4 rounded-xl font-bold font-mono outline-none focus:bg-white leading-relaxed"
                  >${text}</textarea>
                </div>

                <button 
                  type="submit" 
                  class="w-full bg-indigo-500 hover:bg-indigo-600 text-white font-black py-4 px-6 rounded-xl b-heavy border-slate-900 shadow-pop-blue active-pop text-sm uppercase tracking-wider flex items-center justify-center gap-2"
                >
                  ${getIcon("sparkles")} ${buttonText}
                </button>
              </form>
            </div>
          </div>
        `;
      }

      // ==========================================
      // VIEW: SETTINGS SCREEN
      // ==========================================
      function renderSettings() {
        const voices = getVoicesList();
        let voicesOptions = voices.map(v => {
          const selectedAttr = STATE.settings.voiceURI === v.voiceURI ? "selected" : "";
          return `<option value="${v.voiceURI}" ${selectedAttr}>${v.name} (${v.lang})</option>`;
        }).join("");

        if (!voicesOptions) {
          voicesOptions = `<option value="">(Không tìm thấy giọng đọc. Hệ thống dùng mặc định)</option>`;
        }

        return `
          <div class="max-w-2xl mx-auto py-4">
            <div class="flex items-center justify-between mb-6">
              <button onclick="navigate('dashboard')" class="flex items-center gap-1.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 p-2.5 rounded-xl b-heavy border-slate-900 text-xs font-bold active-pop">
                ${getIcon("arrowLeft")} Trở về
              </button>
              <h2 class="text-xl font-black uppercase text-slate-800 dark:text-white">Thiết lập cấu hình âm thanh</h2>
            </div>

            <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl b-heavy border-slate-900 shadow-heavy">
              <form id="settings-form" class="space-y-6">
                <!-- Select TTS voice -->
                <div>
                  <label class="block text-sm font-black mb-1.5 uppercase text-slate-700 dark:text-slate-300">Chọn giọng đọc tiếng Anh của bạn:</label>
                  <select id="settings-voice" class="w-full bg-slate-50 dark:bg-slate-900 b-heavy p-3 rounded-lg font-bold outline-none">
                    ${voicesOptions}
                  </select>
                </div>

                <!-- Rate speech rate -->
                <div>
                  <label class="block text-sm font-black mb-1.5 uppercase text-slate-700 dark:text-slate-300">Tốc độ phát âm chuẩn:</label>
                  <select id="settings-rate" class="w-full bg-slate-50 dark:bg-slate-900 b-heavy p-3 rounded-lg font-bold outline-none">
                    <option value="0.7" ${STATE.settings.speechRate === 0.7 ? "selected" : ""}>Chậm (0.7x)</option>
                    <option value="1.0" ${STATE.settings.speechRate === 1.0 ? "selected" : ""}>Bình thường (1.0x)</option>
                    <option value="1.2" ${STATE.settings.speechRate === 1.2 ? "selected" : ""}>Nhanh (1.2x)</option>
                    <option value="1.5" ${STATE.settings.speechRate === 1.5 ? "selected" : ""}>Rất nhanh (1.5x)</option>
                  </select>
                </div>

                <!-- Custom Font Sizing -->
                <div>
                  <label class="block text-sm font-black mb-1.5 uppercase text-slate-700 dark:text-slate-300">Cỡ chữ ô nhập chính tả:</label>
                  <select id="settings-font" class="w-full bg-slate-50 dark:bg-slate-900 b-heavy p-3 rounded-lg font-bold outline-none">
                    <option value="small" ${STATE.settings.fontSize === "small" ? "selected" : ""}>Nhỏ</option>
                    <option value="medium" ${STATE.settings.fontSize === "medium" ? "selected" : ""}>Vừa</option>
                    <option value="large" ${STATE.settings.fontSize === "large" ? "selected" : ""}>Lớn</option>
                  </select>
                </div>

                <!-- Select Visual Theme theme -->
                <div>
                  <label class="block text-sm font-black mb-1.5 uppercase text-slate-700 dark:text-slate-300">Chủ đề giao diện trực quan:</label>
                  <select id="settings-theme" class="w-full bg-slate-50 dark:bg-slate-900 b-heavy p-3 rounded-lg font-bold outline-none">
                    <option value="light" ${STATE.settings.theme === "light" ? "selected" : ""}>Chế độ sáng (Light Mode)</option>
                    <option value="dark" ${STATE.settings.theme === "dark" ? "selected" : ""}>Chế độ tối (Dark Mode)</option>
                  </select>
                </div>

                <!-- Google Gemini Custom API Key -->
                <div>
                  <label class="block text-sm font-black mb-1.5 uppercase text-slate-700 dark:text-slate-300 flex items-center gap-1.5">
                    ${getIcon("key")} Custom Google Gemini API Key (Không bắt buộc):
                  </label>
                  <input 
                    type="password" 
                    id="settings-api" 
                    placeholder="Dán mã API Key của bạn tại đây để dùng độc lập..." 
                    value="${STATE.settings.customApiKey || ""}"
                    class="w-full bg-slate-50 dark:bg-slate-900 b-heavy p-3 rounded-lg font-bold outline-none focus:bg-white"
                  />
                  <p class="text-[10px] text-slate-400 mt-1 font-bold">Nếu không nhập, hệ thống sẽ sử dụng kết nối máy chủ Cloud Sandbox có sẵn làm mặc định.</p>
                </div>

                <button 
                  type="submit" 
                  class="w-full bg-blue-500 hover:bg-blue-600 text-white font-black py-4 px-6 rounded-xl b-heavy border-slate-900 shadow-pop-blue active-pop text-sm uppercase tracking-wider"
                >
                  Lưu thiết lập của tôi
                </button>
              </form>
            </div>
          </div>
        `;
      }

      // ==========================================
      // EVENT BINDINGS (Dynamic Interaction Bridge)
      // ==========================================
      function bindEvents() {
        // Welcome Submit Form
        const welcomeForm = document.getElementById("welcome-form");
        if (welcomeForm) {
          welcomeForm.addEventListener("submit", handleWelcomeSubmit);
        }

        // Creator Submit Form
        const creatorForm = document.getElementById("creator-form");
        if (creatorForm) {
          creatorForm.addEventListener("submit", handleSaveCustomLesson);
        }

        // Check Dictation Form
        const practiceForm = document.getElementById("practice-check-form");
        if (practiceForm) {
          practiceForm.addEventListener("submit", handleCheckSentence);
        }

        // Settings Submit Form
        const settingsForm = document.getElementById("settings-form");
        if (settingsForm) {
          settingsForm.addEventListener("submit", handleSaveSettings);
        }

        // Super-robust paste and drop blocker for dictation input
        const typedInput = document.getElementById("typed-input");
        if (typedInput) {
          const handleBlockPaste = (e) => {
            e.preventDefault();
            alert("Để học tập hiệu quả và nhớ từ lâu hơn, vui lòng tự gõ lại thay vì dán (paste) chữ bạn nhé! 💪");
            typedInput.value = STATE.typedText || "";
          };
          typedInput.addEventListener("paste", handleBlockPaste);
          typedInput.addEventListener("drop", handleBlockPaste);
          typedInput.addEventListener("beforeinput", (e) => {
            if (e.inputType === "insertFromPaste" || e.inputType === "insertFromDrop") {
              handleBlockPaste(e);
            }
          });
          typedInput.addEventListener("keydown", (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "v") {
              handleBlockPaste(e);
            }
          });
        }
      }

      // ==========================================
      // INITIAL STARTUP SEQUENCE
      // ==========================================
      window.addEventListener("DOMContentLoaded", () => {
        loadState();
        
        // Wait for Speech synthesis voice lists to fully register
        if (synth && synth.onvoiceschanged !== undefined) {
          synth.onvoiceschanged = () => {
            render();
          };
        }

        // Direct Route to dashboard if already named, otherwise welcome
        if (STATE.stats.username) {
          navigate("dashboard");
        } else {
          navigate("welcome");
        }
      });
    </script>
  </body>
</html>
